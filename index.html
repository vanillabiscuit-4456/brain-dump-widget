<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Brain Dump</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="widget">
    <div class="tabs">
      <button class="tab active" data-folder="">ALL</button>
      <button class="tab" data-folder="IDEA">IDEA</button>
      <button class="tab" data-folder="MEMO">MEMO</button>
      <button class="tab" data-folder="TO DO">TO DO</button>
      <button class="tab" data-folder="SCHEDULE">SCHEDULE</button>
    </div>
    <div class="main-area">
      <div class="sidebar">
        <div class="folder-icon" data-folder="IDEA">
          <svg viewBox="0 0 40 32" class="folder-svg folder-c1">
            <path d="M2 6 C2 4, 4 2, 6 2 L14 2 L18 6 L34 6 C36 6, 38 8, 38 10 L38 26 C38 28, 36 30, 34 30 L6 30 C4 30, 2 28, 2 26 Z"/>
          </svg>
          <span>IDEA</span>
        </div>
        <div class="folder-icon" data-folder="MEMO">
          <svg viewBox="0 0 40 32" class="folder-svg folder-c2">
            <path d="M2 6 C2 4, 4 2, 6 2 L14 2 L18 6 L34 6 C36 6, 38 8, 38 10 L38 26 C38 28, 36 30, 34 30 L6 30 C4 30, 2 28, 2 26 Z"/>
          </svg>
          <span>MEMO</span>
        </div>
        <div class="folder-icon" data-folder="TO DO">
          <svg viewBox="0 0 40 32" class="folder-svg folder-c3">
            <path d="M2 6 C2 4, 4 2, 6 2 L14 2 L18 6 L34 6 C36 6, 38 8, 38 10 L38 26 C38 28, 36 30, 34 30 L6 30 C4 30, 2 28, 2 26 Z"/>
          </svg>
          <span>TO DO</span>
        </div>
        <div class="folder-icon" data-folder="SCHEDULE">
          <svg viewBox="0 0 40 32" class="folder-svg folder-c4">
            <path d="M2 6 C2 4, 4 2, 6 2 L14 2 L18 6 L34 6 C36 6, 38 8, 38 10 L38 26 C38 28, 36 30, 34 30 L6 30 C4 30, 2 28, 2 26 Z"/>
          </svg>
          <span>SCHEDULE</span>
        </div>
        <div class="folder-icon folder-archive" data-folder="ARCHIVE">
          <svg viewBox="0 0 40 32" class="folder-svg folder-c5">
            <path d="M2 6 C2 4, 4 2, 6 2 L14 2 L18 6 L34 6 C36 6, 38 8, 38 10 L38 26 C38 28, 36 30, 34 30 L6 30 C4 30, 2 28, 2 26 Z"/>
          </svg>
          <span>🗑️</span>
        </div>
      </div>
      <div class="memo-list" id="memoList"></div>
    </div>
    <div class="input-area">
      <div class="input-toolbar">
        <select id="folderSelect">
          <option value="IDEA">IDEA</option>
          <option value="MEMO">MEMO</option>
          <option value="TO DO">TO DO</option>
          <option value="SCHEDULE">SCHEDULE</option>
        </select>
        <button class="fmt-btn" id="btnCheckbox" title="チェックボックス">☐</button>
        <button class="fmt-btn" id="btnBullet" title="箇条書き">•</button>
      </div>
      <div class="input-row">
        <textarea id="memoInput" placeholder="memo" rows="1"></textarea>
        <button id="sendBtn">SEND</button>
      </div>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
